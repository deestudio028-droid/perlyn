<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perlyn "” Offers</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Gilda+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3e4db;
      --accent: #b98474;
      --text: #4b3b32;
      --light: #fff6f0;
    }
    body {
      margin: 0;
      background: var(--bg);
      font-family: 'Cormorant Garamond', serif;
      color: var(--text);
    }
    /* ðŸ” Navbar */
    header {
      background: var(--bg);
      padding: 14px 24px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 999;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Gilda Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }
    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      font-size: 17px;
      margin: 0 10px;
      transition: 0.3s;
    }
    .nav-links a:hover {
      color: var(--accent);
    }

    /* 🎉 Popup base */
    #coupon-popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }
    .popup-box {
      background: var(--light);
      border-radius: 18px;
      padding: 30px;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 8px 22px rgba(0,0,0,0.15);
      animation: scaleUp 0.3s ease;
    }
    .popup-box h3 {
      font-family: 'Gilda Display', serif;
      color: var(--accent);
      margin-bottom: 8px;
      font-size: 22px;
    }
    .popup-box p {
      font-size: 16px;
      color: var(--text);
      margin: 8px 0;
    }
    .popup-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }
    .copy-btn, .close-btn {
      border: none;
      border-radius: 20px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      cursor: pointer;
      padding: 8px 14px;
      transition: all 0.25s ease;
    }
    .copy-btn {
      background: var(--accent);
      color: #fff;
    }
    .copy-btn:hover { background: #a36c5c; transform: translateY(-1px); }
    .close-btn {
      background: #fff;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    .close-btn:hover {
      background: #f3e4db;
    }

    /* 📦 Offers List */
    .offers-container {
      max-width: 700px;
      background: var(--light);
      margin: 40px auto;
      border-radius: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      padding: 25px;
    }
    .offer-card {
      border: 1px solid #e3cabc;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 14px;
      background: #fffdfb;
      position: relative;
    }
    .offer-card h4 {
      margin: 0 0 6px;
      color: var(--accent);
      font-family: 'Gilda Display', serif;
    }
    .offer-card p { margin: 0; font-size: 15px; }
    .offer-buttons {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }
    .offer-buttons button {
      border: none;
      border-radius: 20px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 14px;
      transition: 0.2s;
    }
    .offer-buttons .copy { background: var(--accent); color: #fff; }
    .offer-buttons .apply { background: #fff; border: 1px solid var(--accent); color: var(--accent); }
    .offer-buttons .apply:hover { background: #f3e4db; }
    .offer-buttons .copy:hover { background: #a36c5c; }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes scaleUp { from { transform: scale(0.9); opacity: 0.5 } to { transform: scale(1); opacity: 1 } }
  </style>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>

<body>
  <header>
    <div class="brand">💄 Perlyn Beauty</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart</a>
      <a href="offers.html" style="color:var(--accent);font-weight:600;">Offers</a>
      <a href="account.html">Account</a>
    </div>
  </header>

  <!-- œ¨ Welcome Offer Popup -->
  <div id="coupon-popup">
    <div class="popup-box">
      <h3>œ¨ Welcome Offer!</h3>
      <p>Get <b>10% OFF</b> on your first purchase above ‚¹599.</p>
      <p>Use Code: <b>AURA10</b></p>
      <div class="popup-actions">
        <button class="copy-btn" onclick="copyCode('AURA10')">Copy Code</button>
        <button class="close-btn" onclick="closePopup()">Close</button>
      </div>
    </div>
  </div>

  <!-- ðŸŽ Active Offers -->
  <div class="offers-container">
    <h2 style="text-align:center;color:var(--accent);font-family:'Gilda Display',serif;">ðŸŽ Active Offers</h2>

    <div class="offer-card" data-min="599" data-code="AURA10">
      <h4>œ¨ AURA10 "” 10% Off</h4>
      <p>Get 10% off your first purchase above ‚¹599.</p>
      <div class="offer-buttons">
        <button class="copy" onclick="copyCode('AURA10')">Copy</button>
        <button class="apply" onclick="applyCoupon('AURA10',599)">Apply</button>
      </div>
    </div>

    <div class="offer-card" data-min="999" data-code="FREESHIP">
      <h4>🚚 FREESHIP "” Free Shipping</h4>
      <p>Enjoy free shipping on orders above ‚¹999.</p>
      <div class="offer-buttons">
        <button class="copy" onclick="copyCode('FREESHIP')">Copy</button>
        <button class="apply" onclick="applyCoupon('FREESHIP',999)">Apply</button>
      </div>
    </div>
  </div>

  <script>
    // ðŸŒ¸ Show popup only first time
    window.addEventListener("load", () => {
      if (!localStorage.getItem("popupShown")) {
        document.getElementById("coupon-popup").style.display = "flex";
        localStorage.setItem("popupShown", "true");
      }
    });

    function copyCode(code) {
      navigator.clipboard.writeText(code);
      alert(`Copied ${code}!`);
    }

    function closePopup() {
      document.getElementById("coupon-popup").style.display = "none";
    }

    function applyCoupon(code, min) {
      // You can fetch subtotal from Supabase/cart later
      const fakeSubtotal = 450; // example
      if (fakeSubtotal < min) {
        const diff = min - fakeSubtotal;
        alert(`‚¹${diff} more to unlock this coupon!`);
      } else {
        alert(`Coupon ${code} applied successfully!`);
        localStorage.setItem("appliedCoupon", code);
      }
    }
  </script>
</body>
</html>
