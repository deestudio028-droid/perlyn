<script>
    var supabase = window.supabaseClient;
    
const buyNowBtn = document.getElementById("buyNowBtn");
function loginNow() {
  window.location.href = "login.html"; // redirect to your login page
}

function shopNow() {
  window.location.href = "shop.html"; // redirect to your shopping page
}

    async function loadCart() {
        const { data: { session } } = await supabase.auth.getSession();
        const cartBox = document.getElementById("cart-container");
        const totalEl = document.getElementById("cart-total");
        const freeMsg = document.getElementById("free-ship-msg");
        
        let cartItems = [];

        if (!session) {
          // GUEST CART LOGIC
          const guestCart = JSON.parse(localStorage.getItem("guestCart") || "[]");
          if (guestCart.length === 0) {
            cartBox.innerHTML = "<p>Your cart is empty.</p>";
            totalEl.textContent = "Total: ₹0";
            return;
          }
          
          const productIds = guestCart.map(i => i.product_id);
          const { data: products } = await supabase.from("products").select("*").in("id", productIds);
          
          if (products) {
            cartItems = guestCart.map(item => {
              const p = products.find(prod => prod.id === item.product_id);
              if (!p) return null;
              return { 
                id: 'guest_' + item.product_id, 
                quantity: item.quantity, 
                products: p 
              };
            }).filter(i => i !== null);
          }
        } else {
          const userId = session.user.id;
          const { data, error } = await supabase
            .from("cart")
            .select(`
        id,
        quantity,
    products (
      id,
      name,
      price,
      image_url,
      shade,
      category,
      stock
    )
      `)
            .eq("user_id", userId);
          if (data) cartItems = data;
        }

        if (!cartItems || !cartItems.length) {
          cartBox.innerHTML = "<p>Your cart is empty.</p>";
          totalEl.textContent = "Total: ₹0";
          freeMsg.innerHTML = `Add items worth <span>₹999</span> for free shipping.`;
          freeMsg.classList.remove("unlocked");
          return;
        }

        let total = 0;
        cartBox.innerHTML = "";
        cartItems.forEach(item => {
        const p = item.products;
        const subtotal = p.price * item.quantity;
        total += subtotal;

        const div = document.createElement("div");

  // 👆 Handle +/- Button Changes
  async function changeQty(cartId, delta, stock) {
    const qtyInput = document.getElementById(`qty-input-${cartId}`);
    let newQty = parseInt(qtyInput.value) + delta;

    if (newQty < 1) newQty = 1;
    if (newQty > stock) {
      vibrateError();
      alert(`Only ${stock} left in stock.`);
      newQty = stock;
    }

    qtyInput.value = newQty;
    
    if (typeof cartId === 'string' && cartId.startsWith('guest_')) {
      const productId = parseInt(cartId.split('_')[1]);
      let guestCart = JSON.parse(localStorage.getItem("guestCart") || "[]");
      const item = guestCart.find(i => i.product_id === productId);
      if (item) {
        item.quantity = newQty;
        localStorage.setItem("guestCart", JSON.stringify(guestCart));
      }
    } else {
      await supabase.from("cart").update({ quantity: newQty }).eq("id", cartId);
    }

    // ✨ Update subtotal of this item directly
    const priceEl = qtyInput.closest(".cart-item").querySelector(".item-price");
    const subtotalEl = qtyInput.closest(".cart-item").querySelector(".subtotal");
    const price = parseFloat(priceEl.textContent.replace(/[₹,]/g, ""));
    subtotalEl.textContent = "₹" + (price * newQty).toLocaleString("en-IN");

    vibrate(); // feedback
    await updateCartTotal(); // ✨ only recalc totals, not reload full cart
  }

  // œï¸ Handle Manual Typing
  async function manualQtyChange(cartId, newValue, stock) {
    let qty = parseInt(newValue);
    if (isNaN(qty) || qty < 1) qty = 1;
    if (qty > stock) {
      vibrateError();
      alert(`Only ${stock} units available.`);
      qty = stock;
    }

    document.getElementById(`qty-input-${cartId}`).value = qty;
    
    if (typeof cartId === 'string' && cartId.startsWith('guest_')) {
      const productId = parseInt(cartId.split('_')[1]);
      let guestCart = JSON.parse(localStorage.getItem("guestCart") || "[]");
      const item = guestCart.find(i => i.product_id === productId);
      if (item) {
        item.quantity = qty;
        localStorage.setItem("guestCart", JSON.stringify(guestCart));
      }
    } else {
      await supabase.from("cart").update({ quantity: qty }).eq("id", cartId);
    }

    // ✨ Update subtotal instantly
    const qtyInput = document.getElementById(`qty-input-${cartId}`);
    const priceEl = qtyInput.closest(".cart-item").querySelector(".item-price");
    const subtotalEl = qtyInput.closest(".cart-item").querySelector(".subtotal");
    const price = parseFloat(priceEl.textContent.replace(/[₹,]/g, ""));
    subtotalEl.textContent = "₹" + (price * qty).toLocaleString("en-IN");

    vibrate();
    await updateCartTotal(); // ✨ recalc bottom summary only
  }

// =================================================
async function loadRewardPoints() {
  const { data: { session } } = await supabase.auth.getSession();
  const rewardMsg = document.getElementById("reward-msg");

  if (!session) {
    rewardMsg.textContent = "Login to view your reward points.";
    return;
  }

  const userId = session.user.id;

  // 🧾 Fetch or initialize points record
  let { data: reward, error } = await supabase
    .from("reward_points")
    .select("total_points")
    .eq("user_id", userId)

    .maybeSingle();

  if (error) {
    console.error("š ï¸ Reward fetch failed:", error);
    rewardMsg.textContent = "Unable to load rewards.";
    return;
  }

  if (!reward) {
    // create empty record if not exists
    await supabase.from("reward_points").insert([{ id: userId, total_points: 0 }]);
    reward = { total_points: 0 };
  }

  const currentPoints = reward.total_points;
  rewardMsg.innerHTML = `🌟 You currently have <b>${currentPoints}</b> reward points!`;

  // 🎯 Progress message
  const nextMilestone = 100;
  if (currentPoints < nextMilestone) {
    const needed = nextMilestone - currentPoints;
    rewardMsg.innerHTML += ` — Collect <b>${needed}</b> more for a surprise free gift 🎁`;
  } else {
    rewardMsg.innerHTML += ` — 🎉 <b>You’ve unlocked a free gift!</b> Use code <b>GIFT100</b>`;
  }
}

let minCouponPurchase = 599; // default fallback

async function loadOffers() {
  const offersBox = document.getElementById("offers-list");
  const viewAllBtn = document.getElementById("view-all-offers");
  const unlockMsg = document.getElementById("unlock-msg");

  try {
    // 🧾 Fetch active offers
    const { data: offers, error } = await supabase
      .from("offers")
      .select("*")
      .eq("active", true)
      .order("created_at", { ascending: false });

    if (error) throw error;

    const now = new Date();
    const validOffers = (offers || []).filter(o => {
      const end = o.expires_on ? new Date(o.expires_on) : null;
      return !end || end >= now;
    });

    // 🎁 Show only the unlock message, hide the offers list
    offersBox.innerHTML = "";

    // 🎉 "View All" button toggle
    if (validOffers.length > 0) {
      viewAllBtn.style.display = "inline";
      viewAllBtn.onclick = () => showAllOffers(validOffers);
    } else {
      viewAllBtn.style.display = "none";
    }

    // 💸 Fetch coupon threshold dynamically
    const { data: coupons, error: couponError } = await supabase
      .from("coupons")
      .select("min_purchase, active")
      .eq("active", true);

   let minCouponPurchase = 599;
if (!couponError && coupons && coupons.length > 0) {
  const activeCoupons = coupons.filter(c => c.active === true || c.active === 'true');
  if (activeCoupons.length > 0) {
    minCouponPurchase = Math.min(...activeCoupons.map(c => c.min_purchase));
  }
}


    // 🧮 Update Unlock Message dynamically
    const subtotal = await getCartSubtotal();
    if (subtotal < minCouponPurchase) {
      unlockMsg.innerHTML = `Add ₹${(minCouponPurchase - subtotal).toFixed(0)} more to unlock coupons`;
    } else if (subtotal < 999) {
      unlockMsg.innerHTML = `🎉 Coupons unlocked! Use <b>any active coupon</b> for savings`;
    } else {
      unlockMsg.innerHTML = `🎁 Coupons + Free shipping unlocked!`;
    }

  } catch (err) {
    console.error("Œ Offers fetch failed:", err);
    offersBox.innerHTML = `<p style="color:#a04c4c;">Couldn't load offers. Please refresh.</p>`;
  }
}
