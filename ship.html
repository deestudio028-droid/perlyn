// ðŸ“¬ Auto-detect City & State from Pincode (India)
document.getElementById("pincode").addEventListener("input", async (e) => {
  const pincode = e.target.value.trim();
  const status = document.getElementById("pincodeStatus");
  const stateEl = document.getElementById("state");
  const cityEl = document.getElementById("city");

  if (pincode.length !== 6) {
    status.textContent = "";
    stateEl.value = "";
    cityEl.value = "";
    return;
  }

  status.textContent = "Detecting city & state...";
  status.style.color = "#b98474";

  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?postalcode=${pincode}&country=India&format=json&addressdetails=1`,
      { headers: { "User-Agent": "PerlynBeauty/1.0 (contact@perlynbeauty.co)" } }
    );

    if (!res.ok) throw new Error("Fetch failed");
    const data = await res.json();

    if (data && data.length > 0) {
      const addr = data[0].address || {};
      const detectedState = addr.state || "";
      const detectedCity =
        addr.city ||
        addr.town ||
        addr.village ||
        addr.suburb ||
        addr.county ||
        addr.state_district ||
        "";

      if (detectedState) stateEl.value = detectedState;
      if (detectedCity) cityEl.value = detectedCity;

      status.textContent = "✅ Location auto-filled successfully!";
      status.style.color = "#3a814e";
    } else {
      status.textContent = "š ï¸ Could not detect location for this pincode.";
      status.style.color = "#b84c4c";
    }
  } catch (err) {
    console.error("📦 Pincode lookup failed:", err);
    status.textContent = "Œ Unable to detect location. Please type manually.";
    status.style.color = "#b84c4c";
    stateEl.removeAttribute("readonly");
    cityEl.removeAttribute("readonly");
  }
});


</script>

// ðŸŸ¢ Improved loadCart() "” handles auth restoration + guest cart
async function loadCart() {
  console.log("🛒 Fetching cart...");

  // Try to get session
  const { data } = await supabaseClient.auth.getSession();
  const session = data?.session;
  
  // Auto-fill email if logged in
  const emailField = document.getElementById("guestEmail");
  if (session && emailField) {
    emailField.value = session.user.email;
    emailField.readOnly = true;
    emailField.style.background = "#fdf7f3";
  }

  if (!session) {
    // ðŸ§  GUEST CART LOGIC
    const guestCart = JSON.parse(localStorage.getItem("guestCart") || "[]");
    if (guestCart.length === 0) {
      alert("Your cart is empty. Please add items first.");
      window.location.href = "shop.html";
      return;
    }
    
    const productIds = guestCart.map(i => i.product_id);
    const { data: products } = await supabaseClient.from("products").select("*").in("id", productIds);
    
    if (products) {
      cartItems = guestCart.map(item => {
        const p = products.find(prod => prod.id === item.product_id);
        if (!p) return null;
        return { name: p.name, shade: p.shade, qty: item.quantity, price: p.price };
      }).filter(i => i !== null);
    }
  } else {
    // 🛒 Fetch cart with product details for logged in user
    const { data: userCart, error } = await supabaseClient
      .from("cart")
      .select(`quantity, products(name, price, shade)`)
      .eq("user_id", session.user.id);
  
    if (error || !userCart || !userCart.length) {
      alert("Your cart is empty. Please add items first.");
      window.location.href = "shop.html";
      return;
    }
  
    // Process data
    cartItems = userCart.map(i => ({
      name: i.products.name,
      shade: i.products.shade,
      qty: i.quantity,
      price: i.products.price
    }));
  }

  subtotal = cartItems.reduce((sum, p) => sum + p.price * p.qty, 0);

// ðŸ§  Load stored discount + shipping from cart page if available

const storedShipping = parseFloat(sessionStorage.getItem("cartShipping")) || 0;
const storedFinalTotal = parseFloat(sessionStorage.getItem("finalTotal")) || 0;

discount = storedDiscount > 0 ? storedDiscount : (subtotal >= 1499 ? 150 : 0);
shipping = storedShipping > 0 || storedShipping === 0 ? storedShipping : 70;

  total = subtotal - discount + shipping;

if (messageEl.value && messageEl.value.trim() !== "") {

// ✅ Helper to convert number to words (basic)
function convertToWords(num) {
  const a = [
    "", "One", "Two", "Three", "Four", "Five", "Six",
    "Seven", "Eight", "Nine", "Ten", "Eleven", "Twelve",
    "Thirteen", "Fourteen", "Fifteen", "Sixteen",
    "Seventeen", "Eighteen", "Nineteen"
  ];
  const b = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];

  if ((num = num.toString()).length > 9) return "Overflow";
  const n = ("000000000" + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
  if (!n) return;
  let str = "";
  str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + " " + a[n[1][1]]) + " Crore " : "";
  str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + " " + a[n[2][1]]) + " Lakh " : "";
  str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + " " + a[n[3][1]]) + " Thousand " : "";
  str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + " " + a[n[4][1]]) + " Hundred " : "";
  str += (n[5] != 0) ? ((str != "") ? "and " : "") + (a[Number(n[5])] || b[n[5][0]] + " " + a[n[5][1]]) : "";
  return str.trim();
}

// ✅ Step 2: Fetch & display saved customer details box
async function showSavedCustomerDetails(userId) {
  const { data, error } = await supabaseClient
    .from("customer_details")
    .select("*")
    .eq("user_id", userId)
    .maybeSingle();

  if (error) {
    console.error("š ï¸ Fetch saved customer details failed:", error);
    return;
  }

  if (data) {
    const container = document.querySelector(".container");
    const box = document.createElement("div");
    box.className = "saved-details-box";
    box.innerHTML = `
      <div class="saved-summary">
        <b>${data.name}</b> (${data.phone})<br>
        ${data.address}, ${data.city}, ${data.state} - ${data.pincode}
      </div>
      <div class="saved-actions">
        <button class="apply-btn">Apply</button>
        <button class="change-btn">Change</button>
      </div>
    `;
    container.insertBefore(box, document.getElementById("shippingForm"));

    // ✅ Apply †’ auto-fill inputs
    box.querySelector(".apply-btn").addEventListener("click", () => {
      nameEl.value = data.name || "";
      phoneEl.value = data.phone || "";
      addressEl.value = data.address || "";
      cityEl.value = data.city || "";
      stateEl.value = data.state || "";
      pincodeEl.value = data.pincode || "";

      box.querySelector(".apply-btn").textContent = "Applied ✅";
      box.querySelector(".apply-btn").disabled = true;
    });

    // ðŸ§¹ Change †’ remove box & allow editing
    box.querySelector(".change-btn").addEventListener("click", () => {
      box.remove();
      alert("You can now edit your address details.");
    });
  }
}

// ✅ Step 3: Save details if checkbox is checked
async function saveCustomerDetailsIfChecked() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) return;

  const saveChecked = document.getElementById("saveDetails").checked;
  if (!saveChecked) return;

  const payload = {
    user_id: session.user.id,
    name: nameEl.value,
    phone: phoneEl.value,
    address: addressEl.value,
    city: cityEl.value,
    state: stateEl.value,
    pincode: pincodeEl.value,
  };

  const { error } = await supabaseClient
    .from("customer_details")
    .upsert(payload, { onConflict: "user_id" });

  if (error) console.error("š ï¸ Save customer details failed:", error);
  else console.log("✅ Customer details saved/updated successfully");
}
